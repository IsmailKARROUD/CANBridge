name: Build CANBridge
on: [push]
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.1'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtnetworkauth'
      
      - name: Configure CMake
        run: cmake -B build -DCMAKE_PREFIX_PATH="${env:Qt6_Dir}" -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Gather dependencies
        run: |
          mkdir deploy
          cp build/Release/CANBridge.exe deploy/
          cd deploy
          D:/a/CANBridge/Qt/6.10.1/msvc2019_64/bin/windeployqt.exe CANBridge.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CANBridge-Windows
          path: deploy/
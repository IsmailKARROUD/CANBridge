name: Build CANBridge

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            qt_host: windows
            qt_arch: win64_msvc2022_64
            artifact: CANBridge-Windows

          - os: macos-latest
            qt_host: mac
            qt_arch: clang_64
            artifact: CANBridge-macOS
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"

          - os: ubuntu-latest
            qt_host: linux
            qt_arch: linux_gcc_64
            artifact: CANBridge-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.10.1'
          host: ${{ matrix.qt_host }}
          target: desktop
          arch: ${{ matrix.qt_arch }}
          modules: qtnetworkauth
          cache: true

      - name: Setup MSVC environment
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build

      - name: Deploy Windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p deploy
          cp build/CANBridge.exe deploy/
          cd deploy
          ${{ env.Qt6_DIR }}/bin/windeployqt.exe CANBridge.exe

      - name: Deploy macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p deploy
          cp -R build/CANBridge.app deploy/
          ${{ env.Qt6_DIR }}/bin/macdeployqt deploy/CANBridge.app -dmg

      - name: Deploy Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p deploy
          cp build/CANBridge deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: deploy/
